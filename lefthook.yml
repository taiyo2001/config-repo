pre-push:
  commands:
    format-check:
      name: Shell Script Formatting
      run: shfmt -i 2 -ci -sr -d .

    shellcheck:
      name: ShellCheck
      run: "find . -name '*.sh' -not -path './.git/*' -not -path './home/dot_zsh/*' | xargs shellcheck --severity=warning"

    smoke-tests:
      name: Bats Smoke Tests
      run: bats tests/

    terraform-fmt:
      name: Terraform Format
      glob: "terraform/*.tf"
      run: terraform -chdir=terraform fmt -recursive

    terraform-validate:
      name: Terraform Validate
      glob: "terraform/*.tf"
      run: terraform -chdir=terraform validate
