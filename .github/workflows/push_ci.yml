name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-format:
    name: Shell Script Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        run: sudo apt-get install -y shfmt

      - name: Verify formatting
        run: shfmt -i 2 -ci -sr -d .

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning
          ignore_paths: "home/dot_zsh utils"

  check-template-vars:
    name: Unresolved Template Variables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for unresolved $${...} variables
        run: bash find_variables.sh

  bats-smoke-test:
    name: Bats Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run smoke tests
        run: bats tests/

  startup-benchmark:
    name: Zsh Startup Benchmark
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install hyperfine zsh-autosuggestions zsh-syntax-highlighting \
            zsh-git-prompt starship direnv z kubectl

      - name: Setup zshrc
        run: cp home/dot_zshrc ~/.zshrc

      - name: Benchmark zsh startup
        run: |
          hyperfine --warmup 3 --export-json bench.json 'zsh -i -c exit'
          python3 -c "
          import json, sys
          with open('bench.json') as f:
              d = json.load(f)
          median = d['results'][0]['median']
          ms = median * 1000
          print(f'Median startup time: {ms:.0f}ms')
          if ms > 500:
              print(f'FAIL: {ms:.0f}ms exceeds 500ms CI threshold')
              sys.exit(1)
          elif ms > 150:
              print(f'WARNING: {ms:.0f}ms exceeds 150ms local target')
          else:
              print(f'OK: within 150ms target')
          "

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Betterleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(gh release view --repo betterleaks/betterleaks --json tagName -q '.tagName')
          TMPDIR=$(mktemp -d)
          gh release download "$VERSION" \
            --repo betterleaks/betterleaks \
            --pattern "betterleaks_${VERSION#v}_linux_x64.tar.gz" \
            --dir "$TMPDIR"
          tar -xzf "$TMPDIR/betterleaks_${VERSION#v}_linux_x64.tar.gz" -C "$TMPDIR"
          find "$TMPDIR" -name "betterleaks" -type f -exec mv {} /usr/local/bin/ \;
          chmod +x /usr/local/bin/betterleaks

      - name: Run Betterleaks
        run: betterleaks git .
