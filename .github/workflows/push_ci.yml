name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      dotfiles: ${{ steps.filter.outputs.dotfiles }}
      zsh: ${{ steps.filter.outputs.zsh }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shell:
              - '**/*.sh'
            dotfiles:
              - 'home/**'
              - 'tests/**'
            zsh:
              - 'home/dot_zshrc'
              - 'home/dot_zsh/**'
              - 'home/dot_config/sheldon/**'
              - 'home/dot_config/starship.toml'
            terraform:
              - 'terraform/**/*.tf'

  check-format:
    name: Shell Script Formatting
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        run: sudo apt-get install -y shfmt

      - name: Verify formatting
        run: shfmt -i 2 -ci -sr -d .

  shellcheck:
    name: ShellCheck
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning
          ignore_paths: "home/dot_zsh"

  bats-smoke-test:
    name: Bats Smoke Tests
    needs: changes
    if: needs.changes.outputs.dotfiles == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run smoke tests
        run: bats tests/

  startup-benchmark:
    name: Zsh Startup Benchmark
    needs: changes
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.zsh == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install hyperfine zsh-autosuggestions zsh-syntax-highlighting \
            zsh-git-prompt starship direnv z kubectl

      - name: Setup zshrc
        run: cp home/dot_zshrc ~/.zshrc

      - name: Benchmark zsh startup
        run: |
          hyperfine --warmup 3 --export-json bench.json 'zsh -i -c exit'
          python3 -c "
          import json, sys
          with open('bench.json') as f:
              d = json.load(f)
          median = d['results'][0]['median']
          ms = median * 1000
          print(f'Median startup time: {ms:.0f}ms')
          if ms > 500:
              print(f'FAIL: {ms:.0f}ms exceeds 500ms CI threshold')
              sys.exit(1)
          elif ms > 150:
              print(f'WARNING: {ms:.0f}ms exceeds 150ms local target')
          else:
              print(f'OK: within 150ms target')
          "

      - name: Convert to benchmark-action format
        run: |
          python3 -c "
          import json
          with open('bench.json') as f:
              d = json.load(f)
          median_ms = d['results'][0]['median'] * 1000
          result = [{'name': 'zsh startup', 'value': round(median_ms, 2), 'unit': 'ms'}]
          with open('benchmark-result.json', 'w') as f:
              json.dump(result, f)
          print(json.dumps(result, indent=2))
          "

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Zsh Startup Time
          tool: customSmallerIsBetter
          output-file-path: benchmark-result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false

  terraform-fmt:
    name: Terraform Format
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check -recursive

  terraform-validate:
    name: Terraform Validate
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Betterleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(gh release view --repo betterleaks/betterleaks --json tagName -q '.tagName')
          TMPDIR=$(mktemp -d)
          gh release download "$VERSION" \
            --repo betterleaks/betterleaks \
            --pattern "betterleaks_${VERSION#v}_linux_x64.tar.gz" \
            --dir "$TMPDIR"
          tar -xzf "$TMPDIR/betterleaks_${VERSION#v}_linux_x64.tar.gz" -C "$TMPDIR"
          find "$TMPDIR" -name "betterleaks" -type f -exec mv {} /usr/local/bin/ \;
          chmod +x /usr/local/bin/betterleaks

      - name: Run Betterleaks
        run: betterleaks git .
