name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check-format:
    name: Shell Script Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        run: sudo apt-get install -y shfmt

      - name: Verify formatting
        run: shfmt -i 2 -ci -sr -d .

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning
          ignore_paths: "home/dot_zsh utils"

  check-template-vars:
    name: Unresolved Template Variables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for unresolved $${...} variables
        run: bash find_variables.sh

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Betterleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(gh release view --repo betterleaks/betterleaks --json tagName -q '.tagName')
          TMPDIR=$(mktemp -d)
          gh release download "$VERSION" \
            --repo betterleaks/betterleaks \
            --pattern "betterleaks_${VERSION#v}_linux_x64.tar.gz" \
            --dir "$TMPDIR"
          tar -xzf "$TMPDIR/betterleaks_${VERSION#v}_linux_x64.tar.gz" -C "$TMPDIR"
          find "$TMPDIR" -name "betterleaks" -type f -exec mv {} /usr/local/bin/ \;
          chmod +x /usr/local/bin/betterleaks

      - name: Run Betterleaks
        run: betterleaks git .
